    <line x1="250" y1="15" x2="250" y2="25" stroke="#302b63" stroke-width="1"/>
    <text x="250" y="40" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">$1,000</text>
    
    <line x1="430" y1="15" x2="430" y2="25" stroke="#302b63" stroke-width="1"/>
    <text x="430" y="40" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">$2,000 ⭐</text>
    
    <line x1="600" y1="15" x2="600" y2="25" stroke="#302b63" stroke-width="1"/>
    <text x="600" y="40" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">$5,000</text>
    
    <text x="780" y="15" font-family="monospace" font-size="10" fill="#8892b0" text-anchor="end">$14,000 max</text>

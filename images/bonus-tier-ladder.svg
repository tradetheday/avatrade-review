      <text x="115" y="15" font-family="monospace" font-size="12" fill="#000" text-anchor="middle">★</text>
      
      <text x="65" y="100" font-family="monospace" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#glow)">$400</text>

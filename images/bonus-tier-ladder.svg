    <rect x="0" y="0" width="845" height="40" fill="#1a1a2e" rx="8" opacity="0.6"/>
    <text x="422" y="25" font-family="monospace" font-size="12" fill="#8892b0" text-anchor="middle">💡 Best value: Deposit $2,000 to get $400 bonus at 20% effective rate — the sweet spot for most traders</text>
  </g>

  <text x="450" y="585" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">AvaTrade Partner Code 128979 · All tiers tested with real deposits · June 2026</text>
</svg>

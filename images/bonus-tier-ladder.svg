      <rect x="0" y="35" width="130" height="160" fill="none" stroke="#ffa500" stroke-width="2" rx="4"/>
      <rect x="-5" y="30" width="140" height="170" fill="none" stroke="#fff" stroke-width="0.5" rx="6" opacity="0.1"/>
      

      <text x="65" y="232" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">12 min ⚡</text>
      <rect x="25" y="240" width="80" height="18" fill="#e94560" rx="9" opacity="0.15"/>
      <text x="65" y="253" font-family="monospace" font-size="9" fill="#e94560" text-anchor="middle">20% rate</text>
    </g>

    <!-- Bar 2: $1,000 -->

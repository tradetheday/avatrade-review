<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="16"/>
  
  <text x="400" y="35" font-family="monospace" font-size="16" font-weight="bold" fill="#e94560" text-anchor="middle">AVATRADE REGISTRATION — WHERE TO ENTER THE PARTNER CODE</text>
  
  <!-- Form mockup -->
  <rect x="180" y="55" width="440" height="340" fill="#16213e" rx="10"/>
  <rect x="180" y="55" width="440" height="35" fill="#e94560" rx="10"/>
  <rect x="180" y="75" width="440" height="15" fill="#e94560"/>
  <text x="400" y="78" font-family="monospace" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">AvaTrade Registration</text>
  
  <!-- Full Name -->
  <text x="210" y="118" font-family="monospace" font-size="13" fill="#fff">Full Name</text>
  <rect x="210" y="125" width="380" height="30" fill="#0f3460" rx="4"/>
  <text x="220" y="144" font-family="monospace" font-size="11" fill="#8892b0">John Smith</text>
  
  <!-- Email -->
  <text x="210" y="175" font-family="monospace" font-size="13" fill="#fff">Email</text>
  <rect x="210" y="182" width="380" height="30" fill="#0f3460" rx="4"/>
  <text x="220" y="201" font-family="monospace" font-size="11" fill="#8892b0">john@example.com</text>
  
  <!-- Phone -->
  <text x="210" y="232" font-family="monospace" font-size="13" fill="#fff">Phone Number</text>
  <rect x="210" y="239" width="380" height="30" fill="#0f3460" rx="4"/>
  <text x="220" y="258" font-family="monospace" font-size="11" fill="#8892b0">+1 555-1234</text>
  
  <!-- Separator -->
  <line x1="210" y1="280" x2="590" y2="280" stroke="#0f3460" stroke-width="1"/>
  
  <!-- Partner Code section - COLLAPSED -->
  <text x="220" y="303" font-family="monospace" font-size="13" font-weight="bold" fill="#e94560">▶ Have a Partner Code?</text>
  
  <!-- Expanded field (visual hint) -->
  <rect x="210" y="315" width="380" height="0" fill="#0f3460" rx="4" opacity="0"/>
  <text x="220" y="335" font-family="monospace" font-size="11" fill="#41b883">Enter code: 128979</text>
  
  <!-- Submit button area -->
  <rect x="100" y="340" width="200" height="0" fill="#e94560" rx="4" opacity="0"/>
  
  <!-- DECORATIVE ARROW pointing to the code field -->
  <g transform="translate(640, 220)">
    <line x1="0" y1="20" x2="45" y2="50" stroke="#41b883" stroke-width="2" stroke-dasharray="4"/>
    <polygon points="45,50 40,42 48,48" fill="#41b883"/>
  </g>
  
  <rect x="645" y="265" width="140" height="55" fill="#1a1a3e" rx="8" stroke="#41b883" stroke-width="1"/>
  <text x="688" y="285" font-family="monospace" font-size="10" fill="#41b883" text-anchor="middle">⚠ COLLAPSED</text>
  <text x="688" y="300" font-family="monospace" font-size="9" fill="#8892b0" text-anchor="middle">Click to expand ↓</text>
  <text x="688" y="313" font-family="monospace" font-size="9" fill="#e94560" text-anchor="middle">Enter 128979</text>

  <text x="400" y="420" font-family="monospace" font-size="11" fill="#e94560" text-anchor="middle">⚠ Most new users miss this field. Click the arrow below "Phone Number" to reveal the code input.</text>
  <text x="400" y="437" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">Partner Code 128979 · Code: 128979</text>
</svg>

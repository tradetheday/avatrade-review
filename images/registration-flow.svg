    <rect x="0" y="18" width="260" height="17" fill="#e94560"/>
    <circle cx="20" cy="17" r="11" fill="#fff" opacity="0.2"/>
    <text x="20" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="140" y="22" font-family="monospace" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Fill in Details</text>
    
    <!-- Form mockup -->
    <rect x="15" y="50" width="230" height="28" fill="#0f3460" rx="5"/>
    <text x="25" y="69" font-family="monospace" font-size="10" fill="#8892b0">Full Name</text>
    
    <rect x="15" y="85" width="230" height="28" fill="#0f3460" rx="5"/>
    <text x="25" y="104" font-family="monospace" font-size="10" fill="#8892b0">Email Address</text>
    
    <rect x="15" y="120" width="230" height="28" fill="#0f3460" rx="5"/>
    <text x="25" y="139" font-family="monospace" font-size="10" fill="#8892b0">Phone Number</text>
    
    <rect x="15" y="155" width="230" height="28" fill="#0f3460" rx="5"/>
    <text x="25" y="174" font-family="monospace" font-size="10" fill="#8892b0">Country</text>
    
    <text x="130" y="193" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">~2 minutes to complete</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(300, 185)">
    <line x1="0" y1="10" x2="40" y2="10" stroke="#e94560" stroke-width="2" opacity="0.6"/>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <text x="400" y="40" font-family="monospace" font-size="16" font-weight="bold" fill="#e94560" text-anchor="middle">REGISTRATION FLOW</text>
  <text x="400" y="60" font-family="monospace" font-size="11" fill="#8892b0" text-anchor="middle">How to enter partner code 128979</text>
  
  <!-- Step 1 -->
  <g transform="translate(30, 85)">
    <rect x="0" y="0" width="230" height="170" fill="#16213e" rx="8" stroke="#e94560" stroke-width="1" opacity="0.6"/>
    <circle cx="20" cy="20" r="12" fill="#e94560"/>
    <text x="20" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="115" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Fill in Details</text>
    <rect x="15" y="40" width="200" height="25" fill="#0f3460" rx="4"/>
    <text x="25" y="57" font-family="monospace" font-size="9" fill="#8892b0">Name, Email, Phone</text>
    <rect x="15" y="72" width="200" height="25" fill="#0f3460" rx="4"/>
    <text x="25" y="89" font-family="monospace" font-size="9" fill="#8892b0">Country, Currency</text>
    <text x="115" y="130" font-family="monospace" font-size="10" fill="#8892b0" text-anchor="middle">Standard signup form</text>
    <text x="115" y="145" font-family="monospace" font-size="10" fill="#8892b0" text-anchor="middle">2 minutes</text>
  </g>
  
  <!-- Arrow 1->2 -->
  <text x="275" y="170" font-family="monospace" font-size="20" fill="#e94560" text-anchor="middle">→</text>
  
  <!-- Step 2 - CRITICAL -->
  <g transform="translate(290, 85)">
    <rect x="0" y="0" width="230" height="170" fill="#16213e" rx="8" stroke="#41b883" stroke-width="2"/>
    <circle cx="20" cy="20" r="12" fill="#41b883"/>
    <text x="20" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <text x="115" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#41b883" text-anchor="middle">Enter Partner Code</text>
    <rect x="15" y="40" width="200" height="25" fill="#1a3a1e" rx="4" stroke="#41b883" stroke-width="1"/>
    <text x="25" y="57" font-family="monospace" font-size="9" fill="#41b883">▶ Have a Partner Code?</text>
    <rect x="15" y="72" width="200" height="25" fill="#1a3a1e" rx="4"/>
    <text x="25" y="89" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">Code: 128979</text>
    <text x="115" y="130" font-family="monospace" font-size="10" fill="#41b883" text-anchor="middle">⚠ Field is COLLAPSED</text>
    <text x="115" y="145" font-family="monospace" font-size="10" fill="#41b883" text-anchor="middle">Below phone number</text>
    <text x="115" y="160" font-family="monospace" font-size="9" fill="#8892b0" text-anchor="middle">Click to expand. Enter 128979.</text>
  </g>
  
  <!-- Arrow 2->3 -->
  <text x="535" y="170" font-family="monospace" font-size="20" fill="#e94560" text-anchor="middle">→</text>
  
  <!-- Step 3 -->
  <g transform="translate(545, 85)">
    <rect x="0" y="0" width="230" height="170" fill="#16213e" rx="8" stroke="#e94560" stroke-width="1" opacity="0.6"/>
    <circle cx="20" cy="20" r="12" fill="#e94560"/>
    <text x="20" y="25" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <text x="115" y="22" font-family="monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">KYC & Deposit</text>
    <rect x="15" y="40" width="200" height="25" fill="#0f3460" rx="4"/>
    <text x="25" y="57" font-family="monospace" font-size="9" fill="#8892b0">ID Verification (15 min)</text>
    <rect x="15" y="72" width="200" height="25" fill="#0f3460" rx="4"/>
    <text x="25" y="89" font-family="monospace" font-size="9" fill="#8892b0">Deposit $1,000+</text>
    <text x="115" y="130" font-family="monospace" font-size="10" fill="#8892b0" text-anchor="middle">Bonus credits auto</text>
    <text x="115" y="145" font-family="monospace" font-size="10" fill="#8892b0" text-anchor="middle">Within 12min-2hrs</text>
  </g>
  
  <!-- Bottom info -->
  <rect x="100" y="420" width="600" height="55" fill="#16213e" rx="8" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <text x="400" y="440" font-family="monospace" font-size="12" font-weight="bold" fill="#e94560" text-anchor="middle">⚠ The partner code field is the most commonly missed step.</text>
  <text x="400" y="460" font-family="monospace" font-size="11" fill="#8892b0" text-anchor="middle">Look for "Have a Partner Code?" below the phone number. Click to expand. Enter 128979.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#41b883;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#41b883;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="glow3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa500;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ffa500;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="600" fill="url(#bg)" rx="16"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="900" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="900" y2="0" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Headers -->
  <text x="45" y="40" font-family="monospace" font-size="18" font-weight="bold" fill="#e94560" letter-spacing="3">REGISTRATION WALKTHROUGH</text>
  <text x="45" y="62" font-family="monospace" font-size="12" fill="#8892b0">How to enter AvaTrade partner code 128979 during signup — the complete flow</text>
  <line x1="45" y1="72" x2="855" y2="72" stroke="#e94560" stroke-width="1" opacity="0.3"/>

  <!-- STEP 1: Account Details -->
  <g transform="translate(30, 95)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="200" fill="#16213e" rx="10"/>
    <!-- Header bar -->

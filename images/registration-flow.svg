    <text x="25" y="138" font-family="monospace" font-size="12" font-weight="bold" fill="#41b883">▶ Have a Partner Code?</text>
    <rect x="25" y="148" width="210" height="20" fill="#0f3460" rx="3"/>
    <text x="35" y="162" font-family="monospace" font-size="11" font-weight="bold" fill="#fff">128979</text>
    
    <text x="130" y="193" font-family="monospace" font-size="9" fill="#41b883" text-anchor="middle">Takes 5 seconds. Do not skip.</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(615, 185)">
    <line x1="0" y1="10" x2="40" y2="10" stroke="#e94560" stroke-width="2" opacity="0.6"/>
    <polygon points="40,10 32,5 32,15" fill="#e94560" opacity="0.6"/>
    <text x="20" y="0" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">next</text>

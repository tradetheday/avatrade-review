      <rect x="40" y="0" width="140" height="25" fill="#e94560" rx="4"/>
      <text x="155" y="17" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">$500 → $100 in 12 min</text>
      
      <!-- $2,000 bar -->
      <rect x="300" y="0" width="230" height="25" fill="#e94560" rx="4" opacity="0.8"/>
      <rect x="300" y="0" width="200" height="25" fill="#ffa500" rx="4"/>
      <text x="415" y="17" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">$2,000 → $400 in 42 min</text>
      
      <!-- $5,000 bar -->
      <rect x="560" y="0" width="250" height="25" fill="#e94560" rx="4" opacity="0.8"/>
      <rect x="560" y="0" width="250" height="25" fill="#41b883" rx="4"/>
      <text x="685" y="17" font-family="monospace" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">$5,000 → $750 in ~2 hrs</text>
    </g>
  </g>

  <!-- Bottom: Key Takeaways -->
  <g transform="translate(30, 435)">
    <rect x="0" y="0" width="845" height="70" fill="#1a1a2e" rx="10" stroke="#e94560" stroke-width="1" opacity="0.5"/>
    
    <!-- Tip 1 -->
    <g transform="translate(15, 15)">
      <circle cx="8" cy="8" r="8" fill="#e94560"/>
      <text x="8" y="12" font-family="monospace" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
      <text x="25" y="22" font-family="monospace" font-size="11" fill="#e94560" font-weight="bold">Enter code DURING signup.</text>
      <text x="25" y="37" font-family="monospace" font-size="10" fill="#8892b0">Not after. Retroactive linking takes 48 hours.</text>
    </g>
    
    <!-- Tip 2 -->
    <g transform="translate(300, 15)">
      <circle cx="8" cy="8" r="8" fill="#41b883"/>
      <text x="8" y="12" font-family="monospace" font-size="9" font-weight="bold" fill="#000" text-anchor="middle">2</text>
      <text x="25" y="22" font-family="monospace" font-size="11" fill="#41b883" font-weight="bold">Look below the phone field.</text>
      <text x="25" y="37" font-family="monospace" font-size="10" fill="#8892b0">The code field is collapsed. Click to expand.</text>
    </g>
    
    <!-- Tip 3 -->
    <g transform="translate(585, 15)">
      <circle cx="8" cy="8" r="8" fill="#ffa500"/>
      <text x="8" y="12" font-family="monospace" font-size="9" font-weight="bold" fill="#000" text-anchor="middle">3</text>
      <text x="25" y="22" font-family="monospace" font-size="11" fill="#ffa500" font-weight="bold">Deposit $1,000+.</text>
      <text x="25" y="37" font-family="monospace" font-size="10" fill="#8892b0">Bonus activates at $1k. Credits in 12min-2hrs.</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="450" y="580" font-family="monospace" font-size="10" fill="#555" text-anchor="middle">AvaTrade Partner Code 128979 · Full guide: tradetheday.com/brokers/avatrade/partner-code</text>
</svg>

    <text x="22" y="141" font-family="monospace" font-size="10" fill="#41b883">✅ Verified (15 min)</text>
    
    <rect x="12" y="158" width="190" height="28" fill="#1a3a1e" rx="5"/>
    <text x="22" y="177" font-family="monospace" font-size="10" fill="#41b883">💵 Deposit $1,000+</text>
  </g>

  <!-- Bottom: Bonus Credit Timeline -->
  <g transform="translate(30, 315)">
    <rect x="0" y="0" width="845" height="100" fill="#16213e" rx="12" filter="url(#shadow)"/>
    <text x="422" y="25" font-family="monospace" font-size="14" font-weight="bold" fill="#e94560" text-anchor="middle">BONUS CREDIT TIMELINE</text>
    <text x="422" y="42" font-family="monospace" font-size="10" fill="#8892b0" text-anchor="middle">Bonus credits automatically after deposit — no emails or support tickets needed</text>
    
    <!-- Timeline bars -->
